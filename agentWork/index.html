<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="mobileView">
        <div class="searchBtn">
            <label for="numberInput">Enter Mobile Number</label>
            <input id="numberInput" type="text" placeholder="9876543210">
            <button onclick="searchbtn()">Search</button>
        </div>

        <div class="agentData" id="agentData">
            <div class="profile-container">
                <img id="profilesImage" alt="Profile Picture">
                <div class="profile-info">
                    <span id="profileName"></span>
                    <span id="profileAddress"></span>
                    <span id="profileWallat"></span>
                </div>
            </div>
            <div class="action-buttons">
                <button id="withdrawBtn">Withdraw</button>
                <button>History</button>
            </div>
        </div>
    </div>
</body>
<script src="index.js"></script>

</html>
