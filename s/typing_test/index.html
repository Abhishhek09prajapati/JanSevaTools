<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multilingual Typing Speed Tester</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Hind:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

        <link rel="stylesheet" href="style.css">

</head>
<!-- Responsive Back Button - Works on All Devices -->
<div class="fixed top-4 left-4 z-50">
    <a href="/" onclick="history.back()"
        class="flex items-center gap-2 px-5 py-3 bg-white text-gray-800 font-medium rounded-full shadow-lg hover:shadow-xl hover:bg-gray-100 transition-all duration-300 border border-gray-300 backdrop-blur-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 rotate-180" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 9l3 3m0 0l-3 3m3-3H8" />
        </svg>
        <span class="hidden sm:inline">Back To Home</span>
        <span class="sm:hidden">Back To Home</span>
    </a>
</div>

<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-4xl bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white p-6">
            <h1 class="text-3xl font-bold text-center">Multilingual Typing Speed Tester</h1>
            <p class="text-center mt-2 opacity-90">Test your typing speed in both English and Hindi</p>
        </div>

        <!-- Language Selection -->
        <div class="p-6 border-b border-gray-200">
            <div class="flex justify-center space-x-4">
                <button id="englishBtn"
                    class="language-btn active px-4 py-2 rounded-lg bg-blue-600 text-white font-medium">
                    <i class="fas fa-language mr-2"></i>English
                </button>
                <button id="hindiBtn" class="language-btn px-4 py-2 rounded-lg bg-gray-200 text-gray-700 font-medium">
                    <i class="fas fa-language mr-2"></i>हिन्दी
                </button>
            </div>
        </div>

        <!-- Stats Section -->
        <div class="p-6 grid grid-cols-2 md:grid-cols-4 gap-4 bg-gray-50">
            <div class="stat-card bg-white p-4 rounded-lg shadow text-center">
                <p class="text-sm text-gray-500">Time</p>
                <p id="timer" class="text-2xl font-bold text-blue-600">60s</p>
            </div>
            <div class="stat-card bg-white p-4 rounded-lg shadow text-center">
                <p class="text-sm text-gray-500">WPM</p>
                <p id="wpm" class="text-2xl font-bold text-green-600">0</p>
            </div>
            <div class="stat-card bg-white p-4 rounded-lg shadow text-center">
                <p class="text-sm text-gray-500">Accuracy</p>
                <p id="accuracy" class="text-2xl font-bold text-purple-600">0%</p>
            </div>
            <div class="stat-card bg-white p-4 rounded-lg shadow text-center">
                <p class="text-sm text-gray-500">Errors</p>
                <p id="errors" class="text-2xl font-bold text-red-600">0</p>
            </div>
        </div>

        <!-- Text Display -->
        <div class="p-6">
            <div id="textDisplay"
                class="text-lg md:text-xl leading-relaxed p-4 bg-gray-100 rounded-lg h-40 overflow-y-auto mb-4 hindi-text">
                <!-- Text will be inserted here by JavaScript -->
            </div>

            <!-- Input Area -->
            <div class="relative">
                <textarea id="typingInput"
                    class="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-none h-32"
                    placeholder="Start typing here..." disabled></textarea>
                <div class="absolute bottom-4 right-4 text-sm text-gray-500">
                    <span id="charCount">0</span> characters
                </div>
            </div>

            <!-- Controls -->
            <div class="flex flex-wrap justify-between mt-6">
                <div class="flex space-x-2">
                    <button id="startBtn"
                        class="px-6 py-3 bg-green-600 text-white rounded-lg font-medium hover:bg-green-700 transition">
                        <i class="fas fa-play mr-2"></i>Start Test
                    </button>
                    <button id="resetBtn"
                        class="px-6 py-3 bg-gray-600 text-white rounded-lg font-medium hover:bg-gray-700 transition"
                        disabled>
                        <i class="fas fa-redo mr-2"></i>Reset
                    </button>
                </div>
                <div class="mt-4 md:mt-0">
                    <label class="inline-flex items-center">
                        <input type="checkbox" id="soundToggle" class="rounded text-blue-600" checked>
                        <span class="ml-2 text-gray-700">Sound on error</span>
                    </label>
                </div>
            </div>
        </div>

        <!-- Results Section -->
        <div id="results" class="p-6 bg-blue-50 hidden">
            <h2 class="text-2xl font-bold text-center text-blue-800 mb-4">Test Results</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-white p-4 rounded-lg shadow text-center">
                    <p class="text-lg font-medium text-gray-700">Typing Speed</p>
                    <p id="resultWpm" class="text-3xl font-bold text-green-600 mt-2">0 WPM</p>
                </div>
                <div class="bg-white p-4 rounded-lg shadow text-center">
                    <p class="text-lg font-medium text-gray-700">Accuracy</p>
                    <p id="resultAccuracy" class="text-3xl font-bold text-purple-600 mt-2">0%</p>
                </div>
                <div class="bg-white p-4 rounded-lg shadow text-center">
                    <p class="text-lg font-medium text-gray-700">Time Taken</p>
                    <p id="resultTime" class="text-3xl font-bold text-blue-600 mt-2">0s</p>
                </div>
            </div>
            <div class="mt-6 text-center">
                <button id="retryBtn"
                    class="px-6 py-3 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition">
                    <i class="fas fa-sync-alt mr-2"></i>Try Again
                </button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="mt-8 text-center text-gray-600">
        <p>Practice regularly to improve your typing speed and accuracy!</p>
    </div>


</body>
<script src="index.js"></script>
</html>
