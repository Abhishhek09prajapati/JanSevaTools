<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1 id="result">Suraj</h1>
</body>
<script>

    async function okay() {

        const s = {
            name: "Suraj Kumar",
            class: "Failed"
        };

        fetch("https://seconcode.vercel.app/")
            .then(res => res.json())
            .then(data => {
                document.getElementById("result").textContent = s.name;
            })
            .catch(err => console.log(err));

    }

    okay();
</script>

</html>
