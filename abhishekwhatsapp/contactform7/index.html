<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="maindiv">

        <h1>Abhishek Enterpises Form</h1>

        <form id="contactForm">

            <div class="input-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" >
            </div>

            <div class="input-group">
                <label for="mobile">Mobile Number</label>
                <input type="number" id="mobile" name="mobile" placeholder="Enter mobile number" required>
            </div>

            <div class="input-group">
                <label for="referral">Referral By</label>
                <input type="text" id="referral" name="referral" placeholder="Referral name">
            </div>

            <div class="input-group">
                <label for="address">Address</label>
                <textarea id="address" name="address" rows="3" placeholder="Enter address" required></textarea>
            </div>

            <button type="submit" id="submited">
                Submit
            </button>

        </form>

    </div>

    <script src="index.js"></script>

</body>

</html>
